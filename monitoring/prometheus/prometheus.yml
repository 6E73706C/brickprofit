global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "flask"
    static_configs:
      - targets: ["web:5000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: "node"
    static_configs:
      - targets: ["${NODE0_HOST}:9100"]
        labels:
          instance: node0
      - targets: ["${NODE1_HOST}:9100"]
        labels:
          instance: node1
      - targets: ["${NODE2_HOST}:9100"]
        labels:
          instance: node2