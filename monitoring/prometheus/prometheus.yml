global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "flask"
    static_configs:
      - targets: ["web:5000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: "node"
    static_configs:
      - targets: ["23.88.123.22:9100"]
        labels:
          instance: node0
      - targets: ["178.105.72.175:9100"]
        labels:
          instance: node1
      - targets: ["178.105.76.42:9100"]
        labels:
          instance: node2