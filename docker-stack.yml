version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# BrickProfit – Docker Swarm Stack
# Rolling updates: each service uses update_config so containers are replaced
# one-by-one with zero downtime.  Scale workers/api by increasing replicas or
# running:  docker service scale brickprofit_api=6
# ─────────────────────────────────────────────────────────────────────────────

networks:
  frontend_net:
    driver: overlay
    attachable: true
  backend_net:
    driver: overlay
    attachable: true
  docker_proxy_net:
    driver: overlay
    attachable: false
  monitoring_net:
    driver: overlay
    attachable: true
  host:
    external: true
    name: host

volumes:
  cassandra_data_1:
  cassandra_data_2:
  cassandra_data_3:
  redis_data:
  grafana_data:
  prometheus_data:
  lego_images:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gluster/lego-images

services:

  # ── Reverse Proxy / SSL Termination ───────────────────────────────────────
  nginx:
    image: brickprofit-nginx:latest
    build:
      context: ./nginx
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    networks:
      - frontend_net
    deploy:
      mode: global
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - api
      - web

  # ── FastAPI  (REST API / public endpoints) ────────────────────────────────
  api:
    image: brickprofit-api:latest
    build:
      context: ./api
    environment:
      - CASSANDRA_HOSTS=["cassandra1","cassandra2","cassandra3"]
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    networks:
      - frontend_net
      - backend_net
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Flask  (admin dashboard / SSR pages) ─────────────────────────────────
  web:
    image: brickprofit-web:latest
    build:
      context: ./web
    environment:
      - CASSANDRA_HOSTS=["cassandra1","cassandra2","cassandra3"]
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=production
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - LEGO_IMAGES_DIR=/data/lego-images
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - lego_images:/data/lego-images
    networks:
      - frontend_net
      - backend_net
      - docker_proxy_net
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "1"
          memory: 384M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Docker Socket Proxy (read-only Docker API for admin panel) ───────────
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      # Read-only endpoints required by the Containers admin page
      - CONTAINERS=1
      - SERVICES=1
      - TASKS=1
      - NODES=1
      # Everything else denied
      - AUTH=0
      - SECRETS=0
      - POST=0
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - EXEC=0
      - IMAGES=0
      - INFO=0
      - NETWORKS=0
      - PLUGINS=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - VOLUMES=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker_proxy_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # ── Celery Worker  (async / background tasks) ─────────────────────────────
  worker:
    image: brickprofit-worker:latest
    build:
      context: ./worker
    environment:
      - CASSANDRA_HOSTS=["cassandra1","cassandra2","cassandra3"]
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    networks:
      - backend_net
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 20s
        order: stop-first           # workers: drain tasks before updating
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "2"
          memory: 512M

  # ── Celery Beat  (scheduler – single replica only!) ───────────────────────
  beat:
    image: brickprofit-worker:latest
    command: ["celery", "-A", "tasks", "beat", "--loglevel=info"]
    environment:
      - CASSANDRA_HOSTS=["cassandra1","cassandra2","cassandra3"]
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - backend_net
    deploy:
      replicas: 1          # NEVER scale beat above 1
      restart_policy:
        condition: on-failure
  # ── Proxy Fetcher  (pulls free proxy lists from GitHub → Cassandra) ────────
  proxy-fetcher:
    image: brickprofit-proxy-fetcher:latest
    build:
      context: ./proxy-fetcher
    environment:
      - CASSANDRA_HOSTS=["cassandra1","cassandra2","cassandra3"]
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - FETCH_INTERVAL_SECONDS=1800
    networks:
      - backend_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 30s
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── Proxy Tester (tests proxies, promotes to golden_proxies) ─────────────
  proxy-tester:
    image: brickprofit-proxy-tester:latest
    build:
      context: ./proxy-tester
    environment:
      - CASSANDRA_HOSTS=["cassandra1","cassandra2","cassandra3"]
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - TEST_INTERVAL_SECONDS=1800
      - TEST_TIMEOUT_SECONDS=12
      - TEST_MAX_WORKERS=150
    networks:
      - backend_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 30s
      resources:
        limits:
          cpus: "1"
          memory: 256M

  # ── Sets Scraper (scrapes BrickLink catalog → lego_sets table) ────────────
  sets-scraper:
    image: brickprofit-sets-scraper:latest
    build:
      context: ./sets-scraper
    environment:
      - CASSANDRA_HOSTS=["cassandra1","cassandra2","cassandra3"]
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - SCRAPE_INTERVAL_SECONDS=3600
      - REQUEST_TIMEOUT_SECONDS=30
      - DELAY_BETWEEN_PAGES_SECONDS=3
      - LEGO_IMAGES_DIR=/data/lego-images
    volumes:
      - lego_images:/data/lego-images
    networks:
      - backend_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 60s
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Redis  (cache + Celery broker) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 256M

  # ── Cassandra Node 1 (seed) ───────────────────────────────────────────────
  cassandra1:
    image: cassandra:4.1
    hostname: cassandra1
    environment:
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME:-BrickProfitCluster}
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_SEEDS=cassandra1
      - CASSANDRA_AUTHENTICATOR=PasswordAuthenticator
      - CASSANDRA_AUTHORIZER=CassandraAuthorizer
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra_data_1:/var/lib/cassandra
      - ./cassandra/init.cql:/docker-entrypoint-initdb.d/init.cql:ro
    networks:
      - backend_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.cassandra == node1
      restart_policy:
        condition: on-failure
        delay: 30s
    healthcheck:
      test: ["CMD", "cqlsh", "-u", "${CASSANDRA_USER}", "-p", "${CASSANDRA_PASSWORD}", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Cassandra Node 2 ──────────────────────────────────────────────────────
  cassandra2:
    image: cassandra:4.1
    hostname: cassandra2
    environment:
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME:-BrickProfitCluster}
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack2
      - CASSANDRA_SEEDS=cassandra1
      - CASSANDRA_AUTHENTICATOR=PasswordAuthenticator
      - CASSANDRA_AUTHORIZER=CassandraAuthorizer
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra_data_2:/var/lib/cassandra
    networks:
      - backend_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.cassandra == node2
      restart_policy:
        condition: on-failure
        delay: 30s

  # ── Cassandra Node 3 ──────────────────────────────────────────────────────
  cassandra3:
    image: cassandra:4.1
    hostname: cassandra3
    environment:
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME:-BrickProfitCluster}
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack3
      - CASSANDRA_SEEDS=cassandra1
      - CASSANDRA_AUTHENTICATOR=PasswordAuthenticator
      - CASSANDRA_AUTHORIZER=CassandraAuthorizer
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra_data_3:/var/lib/cassandra
    networks:
      - backend_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.cassandra == node3
      restart_policy:
        condition: on-failure
        delay: 30s

  # ── Node Exporter (host metrics – runs on every node) ────────────────────
  node_exporter:
    image: prom/node-exporter:latest
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    # Use host network so node_exporter listens on the real server IP (port 9100).
    # Prometheus scrapes it via the physical IPs, giving proper per-node labelling.
    networks:
      - host
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - monitoring_net
      - backend_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.grafana == true

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.1
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=www.brickprofit.net
      - GF_SERVER_ROOT_URL=https://www.brickprofit.net/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring_net
      - frontend_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
