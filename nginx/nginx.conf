worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Use CF-Connecting-IP when behind Cloudflare; fall back to $remote_addr
    # when accessed directly (e.g. health checks, CI deploy steps).
    # This prevents rate-limit bypass by hitting the server IP directly.
    map $http_cf_connecting_ip $real_client_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }
    limit_req_zone $real_client_ip zone=api:10m rate=30r/s;
    limit_req_zone $real_client_ip zone=web:10m rate=60r/s;

    # ── Restore real visitor IP from Cloudflare ───────────────────────────────
    # Full current list: https://www.cloudflare.com/ips-v4
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Docker Swarm internal DNS resolver (lazy resolution at request time) ──
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name brickprofit.net www.brickprofit.net;
        return 301 https://brickprofit.net$request_uri;
    }

    # ── HTTPS – Cloudflare Origin CA cert (SSL mode: Full Strict) ─────────────
    # Generate cert in Cloudflare dashboard:
    #   SSL/TLS → Origin Server → Create Certificate
    # Place files in nginx/ssl/ before building the image:
    #   nginx/ssl/origin.pem   (certificate + chain)
    #   nginx/ssl/origin.key   (private key – add to .gitignore!)
    server {
        listen 443 ssl http2;
        server_name brickprofit.net www.brickprofit.net;

        ssl_certificate     /etc/nginx/ssl/origin.pem;
        ssl_certificate_key /etc/nginx/ssl/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Cloudflare LB health check ────────────────────────────────────────
        # Served directly by nginx so the pool stays green even if api restarts
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── FastAPI ───────────────────────────────────────────────────────────
        location /api/ {
            set $api http://api:8000;
            limit_req zone=api burst=50 nodelay;
            proxy_pass         $api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $real_client_ip;
            proxy_set_header   X-Forwarded-For   $real_client_ip;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }

        # ── Flask / web ───────────────────────────────────────────────────────
        location / {
            set $web http://web:5000;
            limit_req zone=web burst=100 nodelay;
            proxy_pass         $web;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $real_client_ip;
            proxy_set_header   X-Forwarded-For   $real_client_ip;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }

        # ── Grafana ───────────────────────────────────────────────────────────
        location /grafana/ {
            set $grafana http://grafana:3000;
            proxy_pass             $grafana;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Forwarded-Host  $host;
            proxy_set_header       X-Forwarded-Prefix /grafana;
            proxy_set_header       X-Real-IP         $real_client_ip;
            proxy_set_header       X-Forwarded-For   $real_client_ip;
            proxy_set_header       X-Forwarded-Proto https;
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        "upgrade";
            proxy_read_timeout     60s;
            proxy_buffering        off;
        }
    }
}
