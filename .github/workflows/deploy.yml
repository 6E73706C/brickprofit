name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Step 1: Bootstrap infrastructure (idempotent) ──────────────────────────
  setup-swarm:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Bootstrap nodes
        env:
          N0_HOST: ${{ vars.NODE0_HOST }}
          N0_PASS: ${{ secrets.NODE0_SSH_PASSWORD }}
          N1_HOST: ${{ vars.NODE1_HOST }}
          N1_PASS: ${{ secrets.NODE1_SSH_PASSWORD }}
          N2_HOST: ${{ vars.NODE2_HOST }}
          N2_PASS: ${{ secrets.NODE2_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          s() { sshpass -p "$2" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@"$1" "$3"; }

          # ── Install Docker CE & Git on all nodes (reinstall if outdated docker.io is present) ──
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            s "$H" "$P" "
              export DEBIAN_FRONTEND=noninteractive
              # Skip full install if Docker CE already installed, but always ensure daemon is running
              if dpkg -l docker-ce >/dev/null 2>&1; then
                echo 'Docker CE already installed, ensuring daemon is running...'
                systemctl enable docker
                systemctl start docker || true
                docker info >/dev/null && exit 0
                echo 'Daemon failed to start, reinstalling...'
              fi
              # Remove any conflicting packages
              apt-get remove -y docker.io docker-doc docker-compose podman-docker \
                containerd containerd.io runc 2>/dev/null || true
              apt-get autoremove -y 2>/dev/null || true
              apt-get update -qq
              apt-get install -y ca-certificates curl git
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              chmod a+r /etc/apt/keyrings/docker.asc
              echo \"deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable\" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update -qq
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
              systemctl enable docker
              systemctl start docker
              # Verify
              docker info >/dev/null
            "
          done

          # ── Clone repo on all nodes (skip if already present) ──
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            s "$H" "$P" "[ -d /opt/brickprofit ] \
              || git clone https://github.com/6E73706C/brickprofit.git /opt/brickprofit"
          done

          # ── Harden firewall on all nodes (idempotent) ─────────────────────
          # Allow: SSH (from anywhere – needed for CI), HTTP/S, and Docker Swarm
          # ports only from the other swarm node IPs. Everything else is dropped.
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            s "$H" "$P" "
              export DEBIAN_FRONTEND=noninteractive
              apt-get install -y -qq ufw

              # Reset to a known state without disabling active rules mid-flight
              ufw --force reset

              # Default: deny inbound, allow outbound
              ufw default deny incoming
              ufw default allow outgoing

              # Public-facing ports
              ufw allow 22/tcp    comment 'SSH'
              ufw allow 80/tcp    comment 'HTTP'
              ufw allow 443/tcp   comment 'HTTPS'

              # Docker Swarm management + overlay – restrict to swarm node IPs only
              for NODE_IP in $N0_HOST $N1_HOST $N2_HOST; do
                ufw allow from \$NODE_IP to any port 2377 proto tcp comment 'Swarm mgmt'
                ufw allow from \$NODE_IP to any port 7946 proto tcp comment 'Swarm node comm TCP'
                ufw allow from \$NODE_IP to any port 7946 proto udp comment 'Swarm node comm UDP'
                ufw allow from \$NODE_IP to any port 4789 proto udp comment 'Swarm overlay VXLAN'
                ufw allow from \$NODE_IP to any port 9100 proto tcp comment 'node_exporter (Prometheus scrape)'
                ufw allow from \$NODE_IP to any port 24007 proto tcp comment 'GlusterFS daemon'
                ufw allow from \$NODE_IP to any port 24008 proto tcp comment 'GlusterFS mgmt'
                ufw allow from \$NODE_IP to any port 49152:49251 proto tcp comment 'GlusterFS bricks'
              done
              # Allow Docker overlay subnets (10.0.0.0/8) to reach node_exporter
              # so Prometheus works even when containerised on the same host
              ufw allow from 10.0.0.0/8 to any port 9100 proto tcp comment 'node_exporter overlay access'
              # Allow Docker bridge subnet (172.16.0.0/12) – covers same-host scraping
              ufw allow from 172.16.0.0/12 to any port 9100 proto tcp comment 'node_exporter bridge access'

              ufw --force enable
              ufw status verbose
            "
          done

          # ── Init swarm on NODE0 (skip if already active) ──
          N0_STATE=$(s "$N0_HOST" "$N0_PASS" "docker info --format '{{.Swarm.LocalNodeState}}'")
          [ "$N0_STATE" = "active" ] \
            || s "$N0_HOST" "$N0_PASS" "docker swarm init --advertise-addr $N0_HOST"

          # ── Get manager join token from NODE0 ──
          TOKEN=$(s "$N0_HOST" "$N0_PASS" "docker swarm join-token manager -q")

          # ── Join NODE1 to swarm (skip if already active) ──
          JOINED=$(s "$N1_HOST" "$N1_PASS" "docker info --format '{{.Swarm.LocalNodeState}}'")
          [ "$JOINED" = "active" ] \
            || s "$N1_HOST" "$N1_PASS" "docker swarm join --token $TOKEN $N0_HOST:2377"

          # ── Join NODE2 to swarm (skip if already active) ──
          JOINED=$(s "$N2_HOST" "$N2_PASS" "docker info --format '{{.Swarm.LocalNodeState}}'")
          [ "$JOINED" = "active" ] \
            || s "$N2_HOST" "$N2_PASS" "docker swarm join --token $TOKEN $N0_HOST:2377"

          # ── Label nodes for Cassandra placement (|| true = already labelled is ok) ──
          N0_ID=$(s "$N0_HOST" "$N0_PASS" "docker node inspect self --format '{{.ID}}'")
          N1_ID=$(s "$N1_HOST" "$N1_PASS" "docker node inspect self --format '{{.ID}}'")
          N2_ID=$(s "$N2_HOST" "$N2_PASS" "docker node inspect self --format '{{.ID}}'")

          s "$N0_HOST" "$N0_PASS" "docker node update --label-add cassandra=node1 $N0_ID || true"
          s "$N0_HOST" "$N0_PASS" "docker node update --label-add cassandra=node2 $N1_ID || true"
          s "$N0_HOST" "$N0_PASS" "docker node update --label-add cassandra=node3 $N2_ID || true"

          # ── GlusterFS – install & create brick dir on all nodes ────────────
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            s "$H" "$P" "
              export DEBIAN_FRONTEND=noninteractive
              dpkg -l glusterfs-server >/dev/null 2>&1 \
                || apt-get install -y -qq glusterfs-server
              systemctl enable --now glusterd
              mkdir -p /data/glusterbrick/lego-images
              mkdir -p /mnt/gluster/lego-images
              mkdir -p /data/glusterbrick/grafana-data
              mkdir -p /mnt/gluster/grafana-data
            "
          done

          # ── GlusterFS – create trusted pool (idempotent) from NODE0 ────────
          s "$N0_HOST" "$N0_PASS" "
            gluster peer probe $N1_HOST || true
            gluster peer probe $N2_HOST || true
            sleep 2
            gluster volume info lego-images >/dev/null 2>&1 || \
              gluster volume create lego-images replica 3 \
                $N0_HOST:/data/glusterbrick/lego-images \
                $N1_HOST:/data/glusterbrick/lego-images \
                $N2_HOST:/data/glusterbrick/lego-images force
            gluster volume start lego-images || true
            gluster volume info grafana-data >/dev/null 2>&1 || \
              gluster volume create grafana-data replica 3 \
                $N0_HOST:/data/glusterbrick/grafana-data \
                $N1_HOST:/data/glusterbrick/grafana-data \
                $N2_HOST:/data/glusterbrick/grafana-data force
            gluster volume start grafana-data || true
          "

          # ── GlusterFS – mount on all nodes (idempotent) ────────────────────
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            s "$H" "$P" "
              mkdir -p /mnt/gluster/lego-images /mnt/gluster/grafana-data
              if mountpoint -q /mnt/gluster/lego-images; then
                ls /mnt/gluster/lego-images >/dev/null 2>&1 \
                  || { umount -l /mnt/gluster/lego-images || true; mount -t glusterfs localhost:/lego-images /mnt/gluster/lego-images; }
              else
                mount -t glusterfs localhost:/lego-images /mnt/gluster/lego-images
              fi
              grep -qF 'lego-images' /etc/fstab \
                || echo 'localhost:/lego-images /mnt/gluster/lego-images glusterfs defaults,_netdev 0 0' >> /etc/fstab
              if mountpoint -q /mnt/gluster/grafana-data; then
                ls /mnt/gluster/grafana-data >/dev/null 2>&1 \
                  || { umount -l /mnt/gluster/grafana-data || true; mount -t glusterfs localhost:/grafana-data /mnt/gluster/grafana-data; }
              else
                mount -t glusterfs localhost:/grafana-data /mnt/gluster/grafana-data
              fi
              grep -qF 'grafana-data' /etc/fstab \
                || echo 'localhost:/grafana-data /mnt/gluster/grafana-data glusterfs defaults,_netdev 0 0' >> /etc/fstab
            "
          done

  # ── Step 2: Build images on all nodes in parallel ──────────────────────────
  build-node0:
    runs-on: ubuntu-latest
    needs: setup-swarm
    steps:
      - name: Build on NODE0
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE0_HOST }}
          username: root
          password: ${{ secrets.NODE0_SSH_PASSWORD }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/brickprofit && git fetch origin && git reset --hard origin/main
            for SVC in nginx api web worker; do
              docker build --tag "brickprofit-${SVC}:latest" ./${SVC}
            done
            docker build --tag "brickprofit-proxy-fetcher:latest" ./proxy-fetcher
            docker build --tag "brickprofit-proxy-tester:latest" ./proxy-tester
            docker build --tag "brickprofit-sets-scraper:latest" ./sets-scraper
            docker build --tag "brickprofit-prometheus:latest" ./monitoring/prometheus

  build-node1:
    runs-on: ubuntu-latest
    needs: setup-swarm
    steps:
      - name: Build on NODE1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE1_HOST }}
          username: root
          password: ${{ secrets.NODE1_SSH_PASSWORD }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/brickprofit && git fetch origin && git reset --hard origin/main
            for SVC in nginx api web worker; do
              docker build --tag "brickprofit-${SVC}:latest" ./${SVC}
            done
            docker build --tag "brickprofit-proxy-fetcher:latest" ./proxy-fetcher
            docker build --tag "brickprofit-proxy-tester:latest" ./proxy-tester
            docker build --tag "brickprofit-sets-scraper:latest" ./sets-scraper
            docker build --tag "brickprofit-prometheus:latest" ./monitoring/prometheus

  build-node2:
    runs-on: ubuntu-latest
    needs: setup-swarm
    steps:
      - name: Build on NODE2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE2_HOST }}
          username: root
          password: ${{ secrets.NODE2_SSH_PASSWORD }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/brickprofit && git fetch origin && git reset --hard origin/main
            for SVC in nginx api web worker; do
              docker build --tag "brickprofit-${SVC}:latest" ./${SVC}
            done
            docker build --tag "brickprofit-proxy-fetcher:latest" ./proxy-fetcher
            docker build --tag "brickprofit-proxy-tester:latest" ./proxy-tester
            docker build --tag "brickprofit-sets-scraper:latest" ./sets-scraper
            docker build --tag "brickprofit-prometheus:latest" ./monitoring/prometheus

  # ── Step 3: Deploy stack from manager ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-node0, build-node1, build-node2]
    steps:
      - name: Deploy stack from NODE0
        id: deploy_node0
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE0_HOST }}
          username: root
          password: ${{ secrets.NODE0_SSH_PASSWORD }}
          envs: NODE0_HOST,NODE1_HOST,NODE2_HOST
          script: |
            export NODE0_HOST="${{ vars.NODE0_HOST }}"
            export NODE1_HOST="${{ vars.NODE1_HOST }}"
            export NODE2_HOST="${{ vars.NODE2_HOST }}"
            set -a; source /opt/brickprofit/.env; set +a
            : "${GRAFANA_PASSWORD:?GRAFANA_PASSWORD missing in /opt/brickprofit/.env}"
            NGINX_MODE=$(docker service ls --filter name=brickprofit_nginx --format '{{.Mode}}' 2>/dev/null || echo "")
            if [ "$NGINX_MODE" = "replicated" ]; then
              docker service rm brickprofit_nginx || true
              sleep 5
            fi
            docker stack deploy --compose-file /opt/brickprofit/docker-stack.yml --resolve-image never brickprofit
            for SVC in nginx api web worker beat proxy-fetcher proxy-tester sets-scraper docker-socket-proxy grafana prometheus node_exporter; do
              docker service update --force --detach=true brickprofit_${SVC} 2>/dev/null || true
            done
            GRAFANA_CID=""
            for i in $(seq 1 30); do
              GRAFANA_CID=$(docker ps --filter name=brickprofit_grafana --format '{{.ID}}' | head -1 || true)
              if [ -n "$GRAFANA_CID" ]; then
                break
              fi
              sleep 5
            done
            if [ -n "$GRAFANA_CID" ]; then
              docker exec "$GRAFANA_CID" grafana cli --homepath /usr/share/grafana admin reset-admin-password "$GRAFANA_PASSWORD" || true
            fi

      - name: Deploy stack from NODE1 (fallback)
        id: deploy_node1
        continue-on-error: true
        if: steps.deploy_node0.outcome != 'success'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE1_HOST }}
          username: root
          password: ${{ secrets.NODE1_SSH_PASSWORD }}
          script: |
            export NODE0_HOST="${{ vars.NODE0_HOST }}"
            export NODE1_HOST="${{ vars.NODE1_HOST }}"
            export NODE2_HOST="${{ vars.NODE2_HOST }}"
            set -a; source /opt/brickprofit/.env; set +a
            : "${GRAFANA_PASSWORD:?GRAFANA_PASSWORD missing in /opt/brickprofit/.env}"
            NGINX_MODE=$(docker service ls --filter name=brickprofit_nginx --format '{{.Mode}}' 2>/dev/null || echo "")
            if [ "$NGINX_MODE" = "replicated" ]; then
              docker service rm brickprofit_nginx || true
              sleep 5
            fi
            docker stack deploy --compose-file /opt/brickprofit/docker-stack.yml --resolve-image never brickprofit
            for SVC in nginx api web worker beat proxy-fetcher proxy-tester sets-scraper docker-socket-proxy grafana prometheus node_exporter; do
              docker service update --force --detach=true brickprofit_${SVC} 2>/dev/null || true
            done
            GRAFANA_CID=""
            for i in $(seq 1 30); do
              GRAFANA_CID=$(docker ps --filter name=brickprofit_grafana --format '{{.ID}}' | head -1 || true)
              if [ -n "$GRAFANA_CID" ]; then
                break
              fi
              sleep 5
            done
            if [ -n "$GRAFANA_CID" ]; then
              docker exec "$GRAFANA_CID" grafana cli --homepath /usr/share/grafana admin reset-admin-password "$GRAFANA_PASSWORD" || true
            fi

      - name: Deploy stack from NODE2 (fallback)
        if: steps.deploy_node0.outcome != 'success' && steps.deploy_node1.outcome != 'success'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE2_HOST }}
          username: root
          password: ${{ secrets.NODE2_SSH_PASSWORD }}
          script: |
            export NODE0_HOST="${{ vars.NODE0_HOST }}"
            export NODE1_HOST="${{ vars.NODE1_HOST }}"
            export NODE2_HOST="${{ vars.NODE2_HOST }}"
            set -a; source /opt/brickprofit/.env; set +a
            : "${GRAFANA_PASSWORD:?GRAFANA_PASSWORD missing in /opt/brickprofit/.env}"
            NGINX_MODE=$(docker service ls --filter name=brickprofit_nginx --format '{{.Mode}}' 2>/dev/null || echo "")
            if [ "$NGINX_MODE" = "replicated" ]; then
              docker service rm brickprofit_nginx || true
              sleep 5
            fi
            docker stack deploy --compose-file /opt/brickprofit/docker-stack.yml --resolve-image never brickprofit
            for SVC in nginx api web worker beat proxy-fetcher proxy-tester sets-scraper docker-socket-proxy grafana prometheus node_exporter; do
              docker service update --force --detach=true brickprofit_${SVC} 2>/dev/null || true
            done
            GRAFANA_CID=""
            for i in $(seq 1 30); do
              GRAFANA_CID=$(docker ps --filter name=brickprofit_grafana --format '{{.ID}}' | head -1 || true)
              if [ -n "$GRAFANA_CID" ]; then
                break
              fi
              sleep 5
            done
            if [ -n "$GRAFANA_CID" ]; then
              docker exec "$GRAFANA_CID" grafana cli --homepath /usr/share/grafana admin reset-admin-password "$GRAFANA_PASSWORD" || true
            fi

      - name: Init Cassandra schema
        env:
          N0_HOST: ${{ vars.NODE0_HOST }}
          N0_PASS: ${{ secrets.NODE0_SSH_PASSWORD }}
          N1_HOST: ${{ vars.NODE1_HOST }}
          N1_PASS: ${{ secrets.NODE1_SSH_PASSWORD }}
          N2_HOST: ${{ vars.NODE2_HOST }}
          N2_PASS: ${{ secrets.NODE2_SSH_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -qq
          s() { sshpass -p "$2" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@"$1" "$3"; }
          sf() { sshpass -p "$2" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@"$1" "$3" < "$4"; }
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            for i in $(seq 1 30); do
              CONTAINER=$(s "$H" "$P" "docker ps --filter name=brickprofit_cassandra1 --format '{{.ID}}'" 2>/dev/null | head -1 || true)
              if [ -n "$CONTAINER" ]; then
                if s "$H" "$P" "set -a; source /opt/brickprofit/.env; set +a; docker exec $CONTAINER cqlsh -u \$CASSANDRA_USER -p \$CASSANDRA_PASSWORD -e 'DESCRIBE KEYSPACES'" >/dev/null 2>&1; then
                  echo "Cassandra ready on $H – running init.cql..."
                  sshpass -p "$P" ssh -o StrictHostKeyChecking=no root@"$H" "set -a; source /opt/brickprofit/.env; set +a; docker exec -i $CONTAINER cqlsh -u \$CASSANDRA_USER -p \$CASSANDRA_PASSWORD" \
                    < cassandra/init.cql && echo "Schema initialised." || echo "Schema init errors (may already exist)"
                  exit 0
                fi
              fi
              echo "  $H attempt $i/30 – waiting 10s..."
              sleep 10
            done
          done
          echo "WARNING: Cassandra did not become ready on any node"

      - name: Apply Cassandra schema migrations
        env:
          N0_HOST: ${{ vars.NODE0_HOST }}
          N0_PASS: ${{ secrets.NODE0_SSH_PASSWORD }}
          N1_HOST: ${{ vars.NODE1_HOST }}
          N1_PASS: ${{ secrets.NODE1_SSH_PASSWORD }}
          N2_HOST: ${{ vars.NODE2_HOST }}
          N2_PASS: ${{ secrets.NODE2_SSH_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -qq
          s() { sshpass -p "$2" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@"$1" "$3"; }
          MIGRATION="
          USE brickprofit;
          CREATE TABLE IF NOT EXISTS golden_proxies (
            protocol   text,
            ip         text,
            port       int,
            id         uuid,
            source     text,
            first_seen timestamp,
            last_seen  timestamp,
            is_active  boolean,
            PRIMARY KEY (protocol, ip, port)
          );
          CREATE TABLE IF NOT EXISTS lego_sets (
            year        int,
            item_no     text,
            description text,
            image_url   text,
            first_seen  timestamp,
            last_seen   timestamp,
            PRIMARY KEY (year, item_no)
          ) WITH CLUSTERING ORDER BY (item_no ASC);
          "
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            CONTAINER=$(s "$H" "$P" "docker ps --filter name=brickprofit_cassandra1 --format '{{.ID}}'" 2>/dev/null | head -1 || true)
            if [ -n "$CONTAINER" ]; then
              if s "$H" "$P" "set -a; source /opt/brickprofit/.env; set +a; docker exec $CONTAINER cqlsh -u \$CASSANDRA_USER -p \$CASSANDRA_PASSWORD -e 'DESCRIBE KEYSPACES'" >/dev/null 2>&1; then
                echo "Applying migrations on $H..."
                s "$H" "$P" "set -a; source /opt/brickprofit/.env; set +a; docker exec $CONTAINER cqlsh -u \$CASSANDRA_USER -p \$CASSANDRA_PASSWORD -e \"$MIGRATION\"" \
                  && echo "Migrations applied." || echo "Migration error on $H (continuing)"
                exit 0
              fi
            fi
          done
          echo "WARNING: Could not apply migrations – no Cassandra node reachable"

      - name: Sync Grafana admin password
        env:
          N0_HOST: ${{ vars.NODE0_HOST }}
          N0_PASS: ${{ secrets.NODE0_SSH_PASSWORD }}
          N1_HOST: ${{ vars.NODE1_HOST }}
          N1_PASS: ${{ secrets.NODE1_SSH_PASSWORD }}
          N2_HOST: ${{ vars.NODE2_HOST }}
          N2_PASS: ${{ secrets.NODE2_SSH_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -qq
          s() { sshpass -p "$2" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@"$1" "$3"; }
          # Find the active Grafana task and reset admin password deterministically.
          # Fail the workflow if this cannot be done, to avoid silent login drift.
          synced=0
          for attempt in $(seq 1 30); do
            for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
              H=$(echo "$H_P" | cut -d' ' -f1)
              P=$(echo "$H_P" | cut -d' ' -f2)
              GID=$(s "$H" "$P" "docker ps --filter label=com.docker.swarm.service.name=brickprofit_grafana --format '{{.ID}}'" 2>/dev/null | head -1 || true)
              if [ -n "$GID" ]; then
                echo "Grafana container found on $H (attempt $attempt/30): $GID"
                s "$H" "$P" "set -euo pipefail; set -a; source /opt/brickprofit/.env; set +a; : \"\${GRAFANA_PASSWORD:?missing}\"; docker exec $GID grafana cli --homepath /usr/share/grafana admin reset-admin-password \"\$GRAFANA_PASSWORD\""
                echo "Grafana password synced on $H."
                synced=1
                break 2
              fi
            done
            echo "Grafana container not ready yet (attempt $attempt/30), waiting 5s..."
            sleep 5
          done

          if [ "$synced" -ne 1 ]; then
            echo "ERROR: Could not find/reset Grafana admin password on any node."
            exit 1
          fi

      - name: Dump web & api service logs (debug)
        if: always()
        env:
          N0_HOST: ${{ vars.NODE0_HOST }}
          N0_PASS: ${{ secrets.NODE0_SSH_PASSWORD }}
          N1_HOST: ${{ vars.NODE1_HOST }}
          N1_PASS: ${{ secrets.NODE1_SSH_PASSWORD }}
          N2_HOST: ${{ vars.NODE2_HOST }}
          N2_PASS: ${{ secrets.NODE2_SSH_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -qq
          s() { sshpass -p "$2" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@"$1" "$3"; }
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            echo "=== $H: web service logs ==="
            WID=$(s "$H" "$P" "docker ps -a --filter name=brickprofit_web --format '{{.ID}}'" 2>/dev/null | head -1 || true)
            [ -n "$WID" ] && s "$H" "$P" "docker logs --tail 80 $WID 2>&1" || echo "  no web container on $H"
            echo "=== $H: api service logs ==="
            AID=$(s "$H" "$P" "docker ps -a --filter name=brickprofit_api --format '{{.ID}}'" 2>/dev/null | head -1 || true)
            [ -n "$AID" ] && s "$H" "$P" "docker logs --tail 30 $AID 2>&1" || echo "  no api container on $H"
          done

  rolling-reboot:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Rolling update & reboot
        env:
          N0_HOST: ${{ vars.NODE0_HOST }}
          N0_PASS: ${{ secrets.NODE0_SSH_PASSWORD }}
          N1_HOST: ${{ vars.NODE1_HOST }}
          N1_PASS: ${{ secrets.NODE1_SSH_PASSWORD }}
          N2_HOST: ${{ vars.NODE2_HOST }}
          N2_PASS: ${{ secrets.NODE2_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          s()  { sshpass -p "$2" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@"$1" "$3"; }
          # Run a docker command on an available manager (prefer N0, fall back to N1)
          sm() { s "$N0_HOST" "$N0_PASS" "$1" 2>/dev/null || s "$N1_HOST" "$N1_PASS" "$1"; }

          wait_online() {
            local HOST="$1" PASS="$2"
            echo "    Waiting for $HOST to come back online..."
            for i in $(seq 1 40); do
              sleep 15
              sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                root@"$HOST" "echo ok" >/dev/null 2>&1 && echo "    $HOST is back." && return 0 || true
            done
            echo "ERROR: $HOST did not come back within 10 minutes" >&2
            return 1
          }

          # Reboot NODE1 and NODE2 first, then NODE0 (manager) last.
          # Each iteration: drain → update → reboot → wait → re-activate → verify services.
          NODES="$N1_HOST:$N1_PASS $N2_HOST:$N2_PASS $N0_HOST:$N0_PASS"

          for NODE in $NODES; do
            HOST="${NODE%%:*}"
            PASS="${NODE##*:}"

            # Skip reboot if uptime is under 24 hours
            UPTIME_SECS=$(s "$HOST" "$PASS" "awk '{print int(\$1)}' /proc/uptime")
            if [ "$UPTIME_SECS" -lt 86400 ]; then
              echo "⏭  Skipping $HOST — uptime ${UPTIME_SECS}s (< 24 h)."
              continue
            fi

            # Get this node's swarm ID from the node itself
            NODE_ID=$(s "$HOST" "$PASS" "docker node inspect self --format '{{.ID}}'")

            echo "▶  Draining $HOST ($NODE_ID)..."
            sm "docker node update --availability drain $NODE_ID"
            sleep 20   # let swarm reschedule tasks off this node

            echo "▶  Updating OS on $HOST..."
            s "$HOST" "$PASS" "DEBIAN_FRONTEND=noninteractive apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get upgrade -y"

            echo "▶  Rebooting $HOST..."
            s "$HOST" "$PASS" "reboot" || true   # reboot closes the SSH session — ignore exit code

            wait_online "$HOST" "$PASS"

            echo "▶  Re-activating $HOST in swarm..."
            sm "docker node update --availability active $NODE_ID"
            sleep 15   # give the node time to rejoin and start accepting tasks

            echo "✔  $HOST done."
          done

          echo "✔  All nodes updated and back online."
