name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ${{ secrets.REGISTRY }}
  TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push images
        run: |
          for SVC in nginx api web worker; do
            docker build \
              --tag "${REGISTRY}/brickprofit-${SVC}:${TAG}" \
              --tag "${REGISTRY}/brickprofit-${SVC}:latest" \
              ./${SVC}
            docker push "${REGISTRY}/brickprofit-${SVC}:${TAG}"
            docker push "${REGISTRY}/brickprofit-${SVC}:latest"
          done

      - name: Deploy to swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            cd /opt/brickprofit
            git pull origin main
            REGISTRY=${{ secrets.REGISTRY }} TAG=${{ github.sha }} \
              SERVICE="nginx api web worker" \
              bash scripts/rolling-update.sh
