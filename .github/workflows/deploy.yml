name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Step 1: Bootstrap infrastructure (idempotent) ──────────────────────────
  setup-swarm:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Bootstrap nodes
        env:
          N0_HOST: ${{ vars.NODE0_HOST }}
          N0_PASS: ${{ secrets.NODE0_SSH_PASSWORD }}
          N1_HOST: ${{ vars.NODE1_HOST }}
          N1_PASS: ${{ secrets.NODE1_SSH_PASSWORD }}
          N2_HOST: ${{ vars.NODE2_HOST }}
          N2_PASS: ${{ secrets.NODE2_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          s() { sshpass -p "$2" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@"$1" "$3"; }

          # ── Install Docker CE & Git on all nodes (reinstall if outdated docker.io is present) ──
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            s "$H" "$P" "
              export DEBIAN_FRONTEND=noninteractive
              # Skip if Docker CE already installed
              if dpkg -l docker-ce >/dev/null 2>&1; then
                echo 'Docker CE already installed, skipping.'
                exit 0
              fi
              # Remove any conflicting packages
              apt-get remove -y docker.io docker-doc docker-compose podman-docker \
                containerd containerd.io runc 2>/dev/null || true
              apt-get autoremove -y 2>/dev/null || true
              apt-get update -qq
              apt-get install -y ca-certificates curl git
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              chmod a+r /etc/apt/keyrings/docker.asc
              echo \"deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable\" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update -qq
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
              systemctl enable docker
              systemctl start docker
              # Verify
              docker info >/dev/null
            "
          done

          # ── Clone repo on all nodes (skip if already present) ──
          for H_P in "$N0_HOST $N0_PASS" "$N1_HOST $N1_PASS" "$N2_HOST $N2_PASS"; do
            H=$(echo "$H_P" | cut -d' ' -f1)
            P=$(echo "$H_P" | cut -d' ' -f2)
            s "$H" "$P" "[ -d /opt/brickprofit ] \
              || git clone https://github.com/6E73706C/brickprofit.git /opt/brickprofit"
          done

          # ── Init swarm on NODE0 (skip if already active) ──
          N0_STATE=$(s "$N0_HOST" "$N0_PASS" "docker info --format '{{.Swarm.LocalNodeState}}'")
          [ "$N0_STATE" = "active" ] \
            || s "$N0_HOST" "$N0_PASS" "docker swarm init --advertise-addr $N0_HOST"

          # ── Get manager join token from NODE0 ──
          TOKEN=$(s "$N0_HOST" "$N0_PASS" "docker swarm join-token manager -q")

          # ── Join NODE1 to swarm (skip if already active) ──
          JOINED=$(s "$N1_HOST" "$N1_PASS" "docker info --format '{{.Swarm.LocalNodeState}}'")
          [ "$JOINED" = "active" ] \
            || s "$N1_HOST" "$N1_PASS" "docker swarm join --token $TOKEN $N0_HOST:2377"

          # ── Join NODE2 to swarm (skip if already active) ──
          JOINED=$(s "$N2_HOST" "$N2_PASS" "docker info --format '{{.Swarm.LocalNodeState}}'")
          [ "$JOINED" = "active" ] \
            || s "$N2_HOST" "$N2_PASS" "docker swarm join --token $TOKEN $N0_HOST:2377"

          # ── Label nodes for Cassandra placement (|| true = already labelled is ok) ──
          N0_ID=$(s "$N0_HOST" "$N0_PASS" "docker node inspect self --format '{{.ID}}'")
          N1_ID=$(s "$N1_HOST" "$N1_PASS" "docker node inspect self --format '{{.ID}}'")
          N2_ID=$(s "$N2_HOST" "$N2_PASS" "docker node inspect self --format '{{.ID}}'")

          s "$N0_HOST" "$N0_PASS" "docker node update --label-add cassandra=node1 $N0_ID || true"
          s "$N0_HOST" "$N0_PASS" "docker node update --label-add cassandra=node2 $N1_ID || true"
          s "$N0_HOST" "$N0_PASS" "docker node update --label-add cassandra=node3 $N2_ID || true"

  # ── Step 2: Build images on all nodes in parallel ──────────────────────────
  build-node0:
    runs-on: ubuntu-latest
    needs: setup-swarm
    steps:
      - name: Build on NODE0
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE0_HOST }}
          username: root
          password: ${{ secrets.NODE0_SSH_PASSWORD }}
          script: |
            set -euo pipefail
            cd /opt/brickprofit && git pull origin main
            for SVC in nginx api web worker; do
              docker build --tag "brickprofit-${SVC}:latest" ./${SVC}
            done

  build-node1:
    runs-on: ubuntu-latest
    needs: setup-swarm
    steps:
      - name: Build on NODE1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE1_HOST }}
          username: root
          password: ${{ secrets.NODE1_SSH_PASSWORD }}
          script: |
            set -euo pipefail
            cd /opt/brickprofit && git pull origin main
            for SVC in nginx api web worker; do
              docker build --tag "brickprofit-${SVC}:latest" ./${SVC}
            done

  build-node2:
    runs-on: ubuntu-latest
    needs: setup-swarm
    steps:
      - name: Build on NODE2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE2_HOST }}
          username: root
          password: ${{ secrets.NODE2_SSH_PASSWORD }}
          script: |
            set -euo pipefail
            cd /opt/brickprofit && git pull origin main
            for SVC in nginx api web worker; do
              docker build --tag "brickprofit-${SVC}:latest" ./${SVC}
            done

  # ── Step 3: Deploy stack from manager ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-node0, build-node1, build-node2]
    steps:
      - name: Deploy stack from NODE0
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE0_HOST }}
          username: root
          password: ${{ secrets.NODE0_SSH_PASSWORD }}
          script: |
            docker stack deploy \
              --compose-file /opt/brickprofit/docker-stack.yml \
              --resolve-image never \
              brickprofit

  # ── Step 4: Rolling OS update + reboot (one node at a time) ────────────────
  rolling-reboot:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Rolling update & reboot
        env:
          N0_HOST: ${{ vars.NODE0_HOST }}
          N0_PASS: ${{ secrets.NODE0_SSH_PASSWORD }}
          N1_HOST: ${{ vars.NODE1_HOST }}
          N1_PASS: ${{ secrets.NODE1_SSH_PASSWORD }}
          N2_HOST: ${{ vars.NODE2_HOST }}
          N2_PASS: ${{ secrets.NODE2_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          s()  { sshpass -p "$2" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@"$1" "$3"; }
          # Run a docker command on an available manager (prefer N0, fall back to N1)
          sm() { s "$N0_HOST" "$N0_PASS" "$1" 2>/dev/null || s "$N1_HOST" "$N1_PASS" "$1"; }

          wait_online() {
            local HOST="$1" PASS="$2"
            echo "    Waiting for $HOST to come back online..."
            for i in $(seq 1 40); do
              sleep 15
              sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                root@"$HOST" "echo ok" >/dev/null 2>&1 && echo "    $HOST is back." && return 0 || true
            done
            echo "ERROR: $HOST did not come back within 10 minutes" >&2
            return 1
          }

          # Reboot NODE1 and NODE2 first, then NODE0 (manager) last.
          # Each iteration: drain → update → reboot → wait → re-activate → verify services.
          NODES="$N1_HOST:$N1_PASS $N2_HOST:$N2_PASS $N0_HOST:$N0_PASS"

          for NODE in $NODES; do
            HOST="${NODE%%:*}"
            PASS="${NODE##*:}"

            # Get this node's swarm ID from the node itself
            NODE_ID=$(s "$HOST" "$PASS" "docker node inspect self --format '{{.ID}}'")

            echo "▶  Draining $HOST ($NODE_ID)..."
            sm "docker node update --availability drain $NODE_ID"
            sleep 20   # let swarm reschedule tasks off this node

            echo "▶  Updating OS on $HOST..."
            s "$HOST" "$PASS" "DEBIAN_FRONTEND=noninteractive apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get upgrade -y"

            echo "▶  Rebooting $HOST..."
            s "$HOST" "$PASS" "reboot" || true   # reboot closes the SSH session — ignore exit code

            wait_online "$HOST" "$PASS"

            echo "▶  Re-activating $HOST in swarm..."
            sm "docker node update --availability active $NODE_ID"
            sleep 15   # give the node time to rejoin and start accepting tasks

            echo "✔  $HOST done."
          done

          echo "✔  All nodes updated and back online."
