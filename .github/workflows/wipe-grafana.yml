name: Wipe Grafana Volume

on:
  workflow_dispatch:

jobs:
  wipe:
    runs-on: ubuntu-latest
    steps:
      - name: Scale down Grafana, wipe GlusterFS data, redeploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE0_HOST }}
          username: root
          password: ${{ secrets.NODE0_SSH_PASSWORD }}
          command_timeout: 10m
          script: |
            # Stop grafana so it releases the SQLite DB files
            docker service scale brickprofit_grafana=0 2>/dev/null || true
            sleep 10
            # Wipe the shared GlusterFS directory (one node is enough – it replicates)
            rm -rf /mnt/gluster/grafana-data/*
            # Remove any stale local Docker volume (migration from old layout)
            docker volume rm brickprofit_grafana_data 2>/dev/null || true
            # Redeploy – Grafana will reinitialise from the now-empty GlusterFS volume
            cd /opt/brickprofit && git fetch origin && git reset --hard origin/main
            set -a; source /opt/brickprofit/.env; set +a
            docker stack deploy \
              --compose-file /opt/brickprofit/docker-stack.yml \
              --resolve-image never \
              brickprofit
            echo "Stack redeployed. Grafana will start fresh with GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}"
