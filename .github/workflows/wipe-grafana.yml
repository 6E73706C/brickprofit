name: Wipe Grafana Volume

on:
  workflow_dispatch:

jobs:
  wipe:
    runs-on: ubuntu-latest
    steps:
      - name: Scale down Grafana and remove volume on NODE0
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE0_HOST }}
          username: root
          password: ${{ secrets.NODE0_SSH_PASSWORD }}
          command_timeout: 3m
          script: |
            docker service scale brickprofit_grafana=0 2>/dev/null || true
            sleep 10
            docker volume rm brickprofit_grafana_data 2>/dev/null || true

      - name: Remove volume on NODE1
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE1_HOST }}
          username: root
          password: ${{ secrets.NODE1_SSH_PASSWORD }}
          command_timeout: 3m
          script: |
            docker volume rm brickprofit_grafana_data 2>/dev/null || true

      - name: Remove volume on NODE2
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE2_HOST }}
          username: root
          password: ${{ secrets.NODE2_SSH_PASSWORD }}
          command_timeout: 3m
          script: |
            docker volume rm brickprofit_grafana_data 2>/dev/null || true

      - name: Label NODE0 so Grafana is always placed there
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE0_HOST }}
          username: root
          password: ${{ secrets.NODE0_SSH_PASSWORD }}
          command_timeout: 2m
          script: |
            NODE0_ID=$(docker info --format '{{.Swarm.NodeID}}')
            docker node update --label-add grafana=true "$NODE0_ID"

      - name: Redeploy stack from NODE0 (Grafana reinitialises fresh)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE0_HOST }}
          username: root
          password: ${{ secrets.NODE0_SSH_PASSWORD }}
          command_timeout: 10m
          script: |
            cd /opt/brickprofit && git fetch origin && git reset --hard origin/main
            set -a; source /opt/brickprofit/.env; set +a
            docker stack deploy \
              --compose-file /opt/brickprofit/docker-stack.yml \
              --resolve-image never \
              brickprofit

      - name: Force-set Grafana password via CLI (always on NODE0)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NODE0_HOST }}
          username: root
          password: ${{ secrets.NODE0_SSH_PASSWORD }}
          command_timeout: 3m
          script: |
            set -a; source /opt/brickprofit/.env; set +a
            # Grafana is pinned to NODE0 via placement label, so container is always here
            for i in $(seq 1 18); do
              CID=$(docker ps -q -f name=brickprofit_grafana 2>/dev/null | head -1)
              [ -n "$CID" ] && break
              echo "Waiting for Grafana container... ($i)"; sleep 5
            done
            CID=$(docker ps -q -f name=brickprofit_grafana 2>/dev/null | head -1)
            if [ -z "$CID" ]; then echo "ERROR: container not found" >&2; exit 1; fi
            for i in $(seq 1 12); do
              STATUS=$(docker exec "$CID" wget -qO- http://localhost:3000/api/health 2>/dev/null | grep -c '"database":"ok"' || true)
              [ "$STATUS" = "1" ] && break
              echo "Waiting for Grafana HTTP... ($i)"; sleep 5
            done
            docker exec "$CID" grafana cli admin reset-admin-password "${GRAFANA_PASSWORD}"
            echo "Grafana password reset done."
