{% if total_pages > 1 %}
<nav class="mt-3 d-flex gap-2 align-items-center justify-content-end small text-secondary">
  <span>Page {{ page }} / {{ total_pages }}</span>
  {% if page > 1 %}
    <a class="btn btn-sm btn-outline-secondary"
       href="{{ request.path }}?{% for k,v in request.args.items() %}{% if k != 'page' %}{{ k }}={{ v }}&{% endif %}{% endfor %}page={{ page - 1 }}">
      &laquo; Prev
    </a>
  {% endif %}
  {% if page < total_pages %}
    <a class="btn btn-sm btn-outline-secondary"
       href="{{ request.path }}?{% for k,v in request.args.items() %}{% if k != 'page' %}{{ k }}={{ v }}&{% endif %}{% endfor %}page={{ page + 1 }}">
      Next &raquo;
    </a>
  {% endif %}
</nav>
{% endif %}
