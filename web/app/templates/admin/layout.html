<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BrickProfit Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0f1117; color: #e0e0e0; }
    .sidebar { min-height: 100vh; background: #161b22; border-right: 1px solid #30363d; }
    .sidebar .nav-link { color: #8b949e; border-radius: 6px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #21262d; color: #fff; }
    .sidebar .brand { color: #58a6ff; font-weight: 700; font-size: 1.2rem; }
    .main-content { background: #0f1117; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .table { --bs-table-bg: transparent; --bs-table-color: #e0e0e0;
             --bs-table-striped-bg: #1c2128; --bs-table-border-color: #30363d; }
    .table thead th { border-color: #30363d; color: #8b949e; font-size: .75rem;
                      text-transform: uppercase; letter-spacing: .05em; }
    .badge-active { background: #1a7f37; }
    .badge-inactive { background: #6e7681; }
    a { color: #58a6ff; }
    .pagination .page-link { background: #161b22; border-color: #30363d; color: #8b949e; }
    .pagination .page-item.active .page-link { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  </style>
</head>
<body>
<div class="d-flex">
  <!-- Sidebar -->
  <nav class="sidebar d-flex flex-column p-3" style="width:220px;min-width:220px;">
    <a class="brand mb-4 text-decoration-none d-flex align-items-center gap-2" href="{{ url_for('admin.index') }}">
      <i class="bi bi-shield-lock-fill"></i> Admin
    </a>
    <ul class="nav flex-column gap-1 flex-grow-1">
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'admin.index' %}active{% endif %}"
           href="{{ url_for('admin.index') }}">
          <i class="bi bi-grid-fill me-2"></i>Overview
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'admin.users' %}active{% endif %}"
           href="{{ url_for('admin.users') }}">
          <i class="bi bi-people-fill me-2"></i>Users
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'admin.items' %}active{% endif %}"
           href="{{ url_for('admin.items') }}">
          <i class="bi bi-box-seam-fill me-2"></i>Items
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'admin.proxies' %}active{% endif %}"
           href="{{ url_for('admin.proxies') }}">
          <i class="bi bi-diagram-3-fill me-2"></i>Fresh Proxies
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'admin.golden_proxies' %}active{% endif %}"
           href="{{ url_for('admin.golden_proxies') }}">
          <i class="bi bi-trophy-fill me-2"></i>Golden Proxies
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'admin.sessions' %}active{% endif %}"
           href="{{ url_for('admin.sessions') }}">
          <i class="bi bi-key-fill me-2"></i>Sessions
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'admin.containers' %}active{% endif %}"
           href="{{ url_for('admin.containers') }}">
          <i class="bi bi-boxes me-2"></i>Containers
        </a>
      </li>
    </ul>
    <a class="nav-link mt-auto text-danger" href="{{ url_for('auth.logout') }}">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </a>
  </nav>

  <!-- Main -->
  <div class="main-content flex-grow-1 p-4">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
          {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
